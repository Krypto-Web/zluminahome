<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🔐 Admin Login - Lumina Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background: #0a0a0f;
        }
        .login-box {
            background: #1a1a2e;
            padding: 40px 30px;
            border-radius: 16px;
            border: 1px solid rgba(255,215,0,0.08);
            max-width: 400px;
            width: 100%;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header .logo {
            font-size: 40px;
            color: #ffd700;
        }
        .login-header h1 {
            font-size: 24px;
            color: #fff;
            margin-top: 8px;
        }
        .login-header p {
            color: rgba(255,255,255,0.3);
            font-size: 13px;
            margin-top: 4px;
        }
        .login-error {
            display: none;
            color: #e74c3c;
            font-size: 13px;
            text-align: center;
            padding: 8px;
            background: rgba(231,76,60,0.1);
            border-radius: 8px;
            margin-bottom: 12px;
        }
        .login-error.show {
            display: block;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <div class="logo"><i class="fas fa-crown"></i></div>
                <h1>Lumina Admin</h1>
                <p>Enter your credentials to access the dashboard</p>
            </div>

            <div class="login-error" id="loginError">Invalid credentials. Please try again.</div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter username" />
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter password" />
                </div>

                <button type="submit" class="btn btn-primary btn-glow" style="width: 100%;">
                    <i class="fas fa-lock"></i> Login
                </button>
            </form>

            <div style="text-align: center; margin-top: 16px;">
                <a href="index.html" style="color: rgba(255,255,255,0.2); font-size: 12px; text-decoration: none;">
                    <i class="fas fa-arrow-left"></i> Back to Home
                </a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorEl = document.getElementById('loginError');

            if (!username || !password) {
                errorEl.textContent = 'Please enter both username and password';
                errorEl.classList.add('show');
                return;
            }

            // Hardcoded admin credentials
            if (username === 'admin' && password === 'admin123') {
                localStorage.setItem('lumina_admin', 'true');
                window.location.href = 'dashboard.html';
            } else {
                errorEl.textContent = 'Invalid username or password';
                errorEl.classList.add('show');
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        });

        // ===== KEYBOARD SHORTCUT =====
        document.getElementById('password').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
